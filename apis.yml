aid: national-pesticide-information-center
name: National Pesticide Information Center
description: >-
  The National Pesticide Information Center (NPIC) provides objective,
  science-based information about pesticides and their potential health and
  environmental effects. NPIC is a cooperative agreement between Oregon State
  University and the U.S. Environmental Protection Agency, serving the general
  public, health professionals, and pesticide manufacturers.
